<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>請求書発行アプリ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #f0ede8;
    min-height: 100vh;
    padding: 40px 20px;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
  }

  h1 {
    font-size: 13px;
    letter-spacing: 0.3em;
    color: #888;
    text-transform: uppercase;
    margin-bottom: 6px;
    font-weight: 400;
  }

  h2 {
    font-size: 32px;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 40px;
    letter-spacing: -0.02em;
  }

  .card {
    background: #fff;
    border-radius: 16px;
    padding: 36px;
    margin-bottom: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  .card-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #aaa;
    margin-bottom: 24px;
    padding-bottom: 12px;
    border-bottom: 1px solid #f0f0f0;
  }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .span2 { grid-column: span 2; }

  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 12px; font-weight: 500; color: #666; }
  .field input {
    border: 1.5px solid #e8e8e8;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: inherit;
    color: #1a1a1a;
    transition: border-color 0.2s;
    background: #fafafa;
  }
  .field input:focus {
    outline: none;
    border-color: #1a1a1a;
    background: #fff;
  }

  /* 明細テーブル */
  .items-header {
    display: grid;
    grid-template-columns: 3fr 80px 110px 90px 90px 40px;
    gap: 8px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: #aaa;
    margin-bottom: 10px;
    padding: 0 4px;
  }

  .item-row {
    display: grid;
    grid-template-columns: 3fr 80px 110px 90px 90px 40px;
    gap: 8px;
    margin-bottom: 8px;
    align-items: center;
  }

  .item-row input {
    border: 1.5px solid #e8e8e8;
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 13px;
    font-family: inherit;
    background: #fafafa;
    transition: border-color 0.2s;
  }
  .item-row input:focus {
    outline: none;
    border-color: #1a1a1a;
    background: #fff;
  }
  .item-row .amount-display {
    font-size: 13px;
    color: #1a1a1a;
    text-align: right;
    padding: 9px 12px;
    background: #f5f5f5;
    border-radius: 8px;
    font-weight: 500;
  }
  .remove-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: #ccc;
    font-size: 18px;
    line-height: 1;
    transition: color 0.2s;
    text-align: center;
  }
  .remove-btn:hover { color: #e55; }

  .add-item-btn {
    background: none;
    border: 1.5px dashed #ddd;
    border-radius: 8px;
    padding: 10px;
    width: 100%;
    font-size: 13px;
    color: #aaa;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
    margin-top: 8px;
  }
  .add-item-btn:hover {
    border-color: #1a1a1a;
    color: #1a1a1a;
  }

  .total-row {
    display: flex;
    justify-content: flex-end;
    align-items: baseline;
    gap: 12px;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1.5px solid #f0f0f0;
  }
  .total-label { font-size: 13px; color: #666; font-weight: 500; }
  .total-amount {
    font-size: 26px;
    font-weight: 700;
    color: #1a1a1a;
    letter-spacing: -0.02em;
  }
  .total-tax {
    font-size: 12px;
    color: #888;
    font-weight: 400;
  }

  .memo-input {
    width: 100%;
    border: 1.5px solid #e8e8e8;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: inherit;
    color: #1a1a1a;
    background: #fafafa;
    resize: vertical;
    min-height: 60px;
  }
  .memo-input:focus {
    outline: none;
    border-color: #1a1a1a;
    background: #fff;
  }

  .generate-btn {
    width: 100%;
    background: #1a1a1a;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 18px;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: background 0.2s, transform 0.1s;
    margin-top: 8px;
  }
  .generate-btn:hover { background: #333; }
  .generate-btn:active { transform: scale(0.99); }

  @media (max-width: 600px) {
    .grid2, .grid3 { grid-template-columns: 1fr; }
    .span2 { grid-column: span 1; }
    .items-header { display: none; }
    .item-row { grid-template-columns: 1fr 70px 80px 70px 40px; }
    .item-row .amount-display { display: none; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>Invoice Generator</h1>
  <h2>請求書発行</h2>

  <!-- 発行者情報 -->
  <div class="card">
    <div class="card-title">発行者情報</div>
    <div class="grid2" style="gap:16px">
      <div class="field">
        <label>アカウント名（屋号・ブランド名など）</label>
        <input type="text" id="accountName" placeholder="例：たける | 暮らしの便利術">
      </div>
      <div class="field">
        <label>氏名</label>
        <input type="text" id="name" placeholder="例：山本 武尊">
      </div>
      <div class="field">
        <label>郵便番号</label>
        <input type="text" id="zip" placeholder="例：888-8888">
      </div>
      <div class="field">
        <label>住所</label>
        <input type="text" id="address" placeholder="例：福岡県福岡市博多区博多駅前O丁目O-O">
      </div>
      <div class="field">
        <label>電話番号</label>
        <input type="text" id="tel" placeholder="例：000-0000-0000">
      </div>
    </div>
  </div>

  <!-- 請求先（固定） -->
  <input type="hidden" id="clientName" value="株式会社エスフォーアール">

  <!-- 請求日 -->
  <div class="card">
    <div class="card-title">請求日</div>
    <div class="grid2">
      <div class="field">
        <label>請求日</label>
        <input type="date" id="invoiceDate" oninput="updateDueDate()">
      </div>
      <div class="field">
        <label>請求書番号（任意）</label>
        <input type="text" id="invoiceNo" placeholder="例：INV-2026-001">
      </div>
    </div>
    <div style="margin-top:16px; padding:12px 16px; background:#f5f5f5; border-radius:8px; display:flex; align-items:center; gap:10px;">
      <span style="font-size:12px; color:#666; font-weight:500;">お振込期日</span>
      <span id="dueDateDisplay" style="font-size:15px; font-weight:700; color:#1a1a1a;"></span>
    </div>
  </div>

  <!-- 明細 -->
  <div class="card">
    <div class="card-title">明細</div>
    <div class="items-header">
      <span>内容</span>
      <span style="text-align:center">数量</span>
      <span style="text-align:right">単価</span>
      <span style="text-align:right;font-size:10px">消費税(10%)</span>
      <span style="text-align:right">金額</span>
      <span></span>
    </div>
    <div id="itemsContainer"></div>
    <button class="add-item-btn" onclick="addItem()">＋ 明細を追加</button>
    <div style="display:flex;justify-content:flex-end;margin-top:12px;">
      <span id="taxDisplay" style="font-size:12px;color:#888;"></span>
    </div>
    <div class="total-row">
      <span class="total-label">合計金額</span>
      <span class="total-amount" id="totalDisplay">¥0</span>
      <span class="total-tax">（税込）</span>
    </div>
  </div>

  <!-- 振込先 -->
  <div class="card">
    <div class="card-title">振込先</div>
    <div class="grid3">
      <div class="field">
        <label>銀行名</label>
        <input type="text" id="bankName" placeholder="例：OOO銀行">
      </div>
      <div class="field">
        <label>支店名</label>
        <input type="text" id="branch" placeholder="例：第二支店">
      </div>
      <div class="field">
        <label>口座種別</label>
        <input type="text" id="accountType" placeholder="例：普通">
      </div>
      <div class="field">
        <label>口座番号</label>
        <input type="text" id="accountNo" placeholder="例：0000000">
      </div>
      <div class="field span2">
        <label>口座名義</label>
        <input type="text" id="accountHolder" placeholder="例：ヤマモト タケル">
      </div>
    </div>
  </div>

  <!-- 備考 -->
  <div class="card">
    <div class="card-title">備考（任意）</div>
    <textarea class="memo-input" id="memo" placeholder="例：※振込手数料はご負担頂きますようお願いいたします。"></textarea>
  </div>

  <button class="generate-btn" onclick="generatePDF()">📄 PDFを発行する</button>
</div>

<script>
// 日付を "YYYY年MM月DD日" 形式に変換
function formatDateJP(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return y + '年' + m + '月' + day + '日';
}

// 振込期日計算（月末。作成日が月末なら翌月末）
function calcDueDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  const lastDay = new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
  if (d.getDate() === lastDay) {
    const next = new Date(d.getFullYear(), d.getMonth() + 2, 0);
    const m = String(next.getMonth() + 1).padStart(2, '0');
    const day = String(next.getDate()).padStart(2, '0');
    return next.getFullYear() + '年' + m + '月' + day + '日';
  } else {
    const end = new Date(d.getFullYear(), d.getMonth() + 1, 0);
    const m = String(end.getMonth() + 1).padStart(2, '0');
    const day = String(end.getDate()).padStart(2, '0');
    return end.getFullYear() + '年' + m + '月' + day + '日';
  }
}

function updateDueDate() {
  const val = document.getElementById('invoiceDate').value;
  const disp = document.getElementById('dueDateDisplay');
  disp.textContent = val ? calcDueDate(val) : '';
}

// 今日の日付をセット
document.getElementById('invoiceDate').value = new Date().toISOString().split('T')[0];
updateDueDate();

let items = [];

function addItem(content='', qty=1, price=0) {
  items.push({ content, qty, price });
  renderItems();
}

function removeItem(i) {
  items.splice(i, 1);
  renderItems();
}

function renderItems() {
  const container = document.getElementById('itemsContainer');
  container.innerHTML = '';
  items.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'item-row';
    const amount = item.qty * item.price;
    const tax = Math.floor(amount * 0.1);
    row.innerHTML = `
      <input type="text" placeholder="内容" value="${item.content}"
        oninput="items[${i}].content=this.value">
      <input type="number" placeholder="1" value="${item.qty}" min="1"
        oninput="items[${i}].qty=parseFloat(this.value)||0;renderItems()">
      <input type="number" placeholder="0" value="${item.price}" min="0"
        oninput="items[${i}].price=parseFloat(this.value)||0;renderItems()">
      <div class="amount-display" style="font-size:12px;color:#888;">¥${tax.toLocaleString()}</div>
      <div class="amount-display">¥${amount.toLocaleString()}</div>
      <button class="remove-btn" onclick="removeItem(${i})">×</button>
    `;
    container.appendChild(row);
  });
  updateTotal();
}

function updateTotal() {
  const subtotal = items.reduce((s, it) => s + it.qty * it.price, 0);
  const tax = Math.floor(subtotal * 0.1);
  document.getElementById('totalDisplay').textContent = '¥' + subtotal.toLocaleString();
  const taxEl = document.getElementById('taxDisplay');
  if (taxEl) taxEl.textContent = '消費税（10%）：¥' + tax.toLocaleString();
}

// 初期明細
addItem('SNS PR投稿費用として', 1, 5000);

// PDF生成（日本語は画像変換方式）
async function generatePDF() {
  const { jsPDF } = window.jspdf;

  const g = id => document.getElementById(id).value.trim();

  const data = {
    accountName: g('accountName'),
    name: g('name'),
    zip: g('zip'),
    address: g('address'),
    tel: g('tel'),
    clientName: g('clientName') || '（宛名未入力）',
    invoiceDate: g('invoiceDate'),
    dueDate: calcDueDate(g('invoiceDate')),
    invoiceNo: g('invoiceNo'),
    bankName: g('bankName'),
    branch: g('branch'),
    accountType: g('accountType'),
    accountNo: g('accountNo'),
    accountHolder: g('accountHolder'),
    memo: g('memo'),
    items: items.filter(it => it.content),
    total: items.reduce((s, it) => s + it.qty * it.price, 0),
    tax: Math.floor(items.reduce((s, it) => s + it.qty * it.price, 0) * 0.1)
  };

  // HTMLを使ってCanvasに描画してPDF化
  const canvas = document.createElement('canvas');
  canvas.width = 794;   // A4 96dpi
  canvas.height = 1123;
  const ctx = canvas.getContext('2d');

  // 背景
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, 794, 1123);

  // フォント設定ヘルパー
  const font = (size, weight='normal') => {
    ctx.font = `${weight} ${size}px 'Noto Sans JP', sans-serif`;
  };

  const fmt = n => '¥' + n.toLocaleString();

  // タイトル
  ctx.fillStyle = '#1a1a1a';
  font(28, 'bold');
  ctx.textAlign = 'center';
  ctx.fillText('御　請　求　書', 397, 80);

  // 区切り線
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(60, 95); ctx.lineTo(734, 95); ctx.stroke();

  // 請求日・番号（右上）
  font(11);
  ctx.textAlign = 'right';
  ctx.fillStyle = '#555';
  if (data.invoiceDate) {
    ctx.fillText('請求日：' + formatDateJP(data.invoiceDate), 734, 50);
  }
  if (data.invoiceNo) {
    ctx.fillText('No. ' + data.invoiceNo, 734, 65);
  }
  if (data.dueDate) {
    ctx.fillText('お振込期日：' + data.dueDate, 734, 80);
  }

  // 宛名
  ctx.textAlign = 'left';
  ctx.fillStyle = '#1a1a1a';
  font(16, 'bold');
  ctx.fillText(data.clientName + '　御中', 60, 140);

  // 発行者情報（右側）
  ctx.textAlign = 'right';
  font(11);
  ctx.fillStyle = '#444';
  let ry = 115;
  const rightLines = [
    data.zip ? '〒' + data.zip : '',
    data.address,
    data.tel ? 'TEL：' + data.tel : '',
    data.name,
    data.accountName
  ].filter(Boolean);
  rightLines.forEach(line => {
    ctx.fillText(line, 734, ry);
    ry += 17;
  });

  // 下記の通り
  ctx.textAlign = 'left';
  font(12);
  ctx.fillStyle = '#444';
  ctx.fillText('下記の通り御請求申し上げます。', 60, 170);

  // 区切り線
  ctx.strokeStyle = '#ddd';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(60, 183); ctx.lineTo(734, 183); ctx.stroke();

  // 請求金額
  font(13);
  ctx.fillStyle = '#444';
  ctx.fillText('ご請求金額', 60, 215);
  font(36, 'bold');
  ctx.fillStyle = '#1a1a1a';
  ctx.fillText(fmt(data.total), 200, 220);
  font(16);
  ctx.fillText('円', 200 + ctx.measureText(fmt(data.total)).width + 6, 220);

  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(60, 230); ctx.lineTo(734, 230); ctx.stroke();

  // 明細テーブルヘッダー
  const tableTop = 250;
  const cols = { content: 60, qty: 400, price: 490, tax: 580, amount: 670 };
  const rowH = 32;

  ctx.fillStyle = '#d0d0d0';
  ctx.fillRect(60, tableTop, 674, rowH);
  ctx.fillStyle = '#1a1a1a';
  font(12, 'bold');
  ctx.textAlign = 'center';
  ctx.fillText('内　容', 60 + (cols.qty - 60) / 2, tableTop + 21);
  ctx.fillText('数量', cols.qty + 42, tableTop + 21);
  ctx.fillText('単　価', cols.price + 42, tableTop + 21);
  ctx.fillText('消費税', cols.tax + 42, tableTop + 21);
  ctx.fillText('金　額', cols.amount + 32, tableTop + 21);

  // 明細行
  const maxItems = 10;
  for (let i = 0; i < maxItems; i++) {
    const y = tableTop + rowH + i * rowH;
    ctx.fillStyle = i % 2 === 0 ? '#f9f9f9' : '#fff';
    ctx.fillRect(60, y, 674, rowH);

    if (data.items[i]) {
      const it = data.items[i];
      ctx.fillStyle = '#1a1a1a';
      font(12);
      ctx.textAlign = 'center';
      ctx.fillText(it.content, 60 + (cols.qty - 60) / 2, y + 21);
      ctx.fillText(it.qty, cols.qty + 42, y + 21);
      ctx.textAlign = 'right';
      ctx.fillText(fmt(it.price), cols.price + 82, y + 21);
      ctx.fillStyle = '#888';
      ctx.fillText(fmt(Math.floor(it.qty * it.price * 0.1)), cols.tax + 82, y + 21);
      ctx.fillStyle = '#1a1a1a';
      ctx.fillText(fmt(it.qty * it.price), cols.amount + 64, y + 21);
    }

    // 枠線
    ctx.strokeStyle = '#e0e0e0';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(60, y, 674, rowH);
    // 縦線
    [cols.qty, cols.price, cols.tax, cols.amount].forEach(x => {
      ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y + rowH); ctx.stroke();
    });
  }

  // 合計行
  const sumY = tableTop + rowH + maxItems * rowH;
  ctx.fillStyle = '#f0f0f0';
  ctx.fillRect(60, sumY, 674, rowH);
  ctx.fillStyle = '#1a1a1a';
  font(12, 'bold');
  ctx.textAlign = 'right';
  ctx.fillText('計', cols.amount - 4, sumY + 21);
  ctx.textAlign = 'right';
  ctx.fillText(fmt(data.total), cols.amount + 64, sumY + 21);
  ctx.strokeStyle = '#e0e0e0';
  ctx.lineWidth = 0.5;
  ctx.strokeRect(60, sumY, 674, rowH);
  [cols.qty, cols.price, cols.tax, cols.amount].forEach(x => {
    ctx.beginPath(); ctx.moveTo(x, sumY); ctx.lineTo(x, sumY + rowH); ctx.stroke();
  });

  // 振込先・合計 ボックス
  const boxY = sumY + rowH + 20;
  // 振込先
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#ccc';
  ctx.lineWidth = 1;
  ctx.strokeRect(60, boxY, 370, 90);
  ctx.fillStyle = '#d0d0d0';
  ctx.fillRect(60, boxY, 370, 22);
  ctx.fillStyle = '#1a1a1a';
  font(11, 'bold');
  ctx.textAlign = 'left';
  ctx.fillText('お振込先', 72, boxY + 15);
  ctx.fillStyle = '#1a1a1a';
  font(11);
  let bi = boxY + 36;
  [
    `銀行　${data.bankName}`,
    `支店　${data.branch}`,
    `口座　${data.accountNo}（${data.accountType}）`,
    `名義　${data.accountHolder}`
  ].forEach(line => {
    ctx.fillText(line, 72, bi);
    bi += 15;
  });

  // 合計金額ボックス
  ctx.fillStyle = '#d0d0d0';
  ctx.fillRect(434, boxY, 300, 90);
  ctx.fillStyle = '#1a1a1a';
  font(12, 'bold');
  ctx.textAlign = 'center';
  ctx.fillText('合計金額', 584, boxY + 28);
  font(24, 'bold');
  const totalText = fmt(data.total);
  const totalWidth = ctx.measureText(totalText).width;
  font(11, 'normal');
  const taxWidth = ctx.measureText('（税込）').width;
  const totalX = 584 - (totalWidth + 6 + taxWidth) / 2;
  font(24, 'bold');
  ctx.textAlign = 'left';
  ctx.fillText(totalText, totalX, boxY + 65);
  font(11, 'normal');
  ctx.fillStyle = '#555';
  ctx.fillText('（税込）', totalX + totalWidth + 4, boxY + 65);

  // 備考（常時表示）
  const memoY = boxY + 110;
  ctx.strokeStyle = '#ccc';
  ctx.lineWidth = 1;
  ctx.strokeRect(60, memoY, 674, 70);
  ctx.fillStyle = '#d0d0d0';
  ctx.fillRect(60, memoY, 674, 20);
  ctx.fillStyle = '#1a1a1a';
  font(10, 'bold');
  ctx.textAlign = 'left';
  ctx.fillText('備考', 72, memoY + 14);
  if (data.memo) {
    ctx.fillStyle = '#444';
    font(11);
    ctx.fillText(data.memo, 72, memoY + 44);
  }

  // PDF化
  const imgData = canvas.toDataURL('image/png');
  const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  pdf.addImage(imgData, 'PNG', 0, 0, 210, 297);

  const dateStr = data.invoiceDate.replace(/-/g, '') || 'invoice';
  pdf.save(`請求書_${dateStr}.pdf`);
}
</script>
